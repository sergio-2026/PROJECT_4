<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timed Typing Test</title>
    <!-- Basic page styling for the typing test app -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-container">
      <h1>Timed Typing Test</h1>
      <p>
        Type the paragraph below as fast and as accurately as you can.
        The timer will start when you begin typing.
      </p>

      <!-- 2.1-2.4 Dynamic Visual Feedback: this wrapper border changes color -->
      <div class="test-wrapper border-neutral" id="test-wrapper">
        <!-- 2.7 Origin text comes from the random paragraph array in script.js -->
        <div id="origin-text">
          <!-- 2.8 This paragraph is replaced with a random one when page loads and on Start Over -->
          <p>Loading practice text...</p>
        </div>

        <!-- 1.2 Input Validation: user types here so we can compare text -->
        <label for="test-area">Start typing here:</label>
        <textarea
          id="test-area"
          rows="7"
          cols="60"
          placeholder="Start typing the text above..."
        ></textarea>
      </div>

      <div id="info-panel">
        <!-- 1.1 Standard Timer: timer shows minutes, seconds, hundredths -->
        <div class="info-item">
          <span class="info-label">Timer:</span>
          <span id="timer">00:00:00</span>
        </div>

        <!-- 2.9 WPM: words per minute display -->
        <div class="info-item">
          <span class="info-label">WPM:</span>
          <span id="wpm-display">0</span>
        </div>

        <!-- 2.10 Error Counter: show how many times the user made mistakes -->
        <div class="info-item">
          <span class="info-label">Errors:</span>
          <span id="error-display">0</span>
        </div>
      </div>

      <!-- 1.4 Reset Logic: Start Over button clears test and picks a new paragraph -->
      <button id="reset-button">Start Over</button>

      <!-- 2.5 and 2.6 Top Three Fastest Scores stored in localStorage -->
      <section id="scores-section">
        <h2>Top 3 Fastest Times</h2>
        <ol id="scores-list">
          <!-- Filled by JavaScript using saved scores -->
        </ol>
      </section>
    </div>

    <!-- JavaScript logic for the typing test app -->
    <script src="script.js"></script>
  </body>
</html>
